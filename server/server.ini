[INIT]
ServerIp=127.0.0.1
CrcSubKey=12345
StartPort=5028
StartPortEstadisticas=7669
Hide=1
AllowMultiLogins=1
IdleLimit=10
Version=0.14.0
IniciarDesdeBackUp=0
ClientsCommandsQueue=1
CleanInterval=15
PuedeCrearPersonajes=1
Notice=Testing Notice - Rust Server

ClientVersion=1.0.0

ServerSoloGMs=0
Testing=0

MultiplicadordeExp=1
MultiplicadordeOro=1
MultiplicadordeDrop=1

CamaraLenta=0
MapaPretoriano=163

MaxUsers=400

StartPos=1-58-45
Record= 1


; Privilege roles — comma-separated character names (e.g. Admins=Shay,Shay2)
Admins=Shay
SubAdmins=
Devs=
Directors=
GranDioses=
Dioses=
Events=
SemiDioses=
Consejeros=

; Argentum Online - Server Side Library
[AOSSLib]
;;todos los directorios asumen ser subs de App.Path;;
;directorio donde escribira el log
logdir=logs
;directorio charfiles usado por CAutoDeleteUsers
chardir=charfile

; ============================================================
; INTERVALS — All values are in MILLISECONDS (ms)
; Converted to game ticks (value / 40, rounded) at load time.
; Example: 20000ms = 500 ticks = 20 seconds
; ============================================================
[INTERVALOS]
IntervaloParalizado=20000
IntervaloInvisible=20000
IntervaloOculto=20000
IntervaloNpcAI=1300
