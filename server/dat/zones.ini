; ============================================================
; ZONE PROPERTIES — Override zone behavior per map.
;
; Zones not listed here inherit properties from their .dat files.
; Section format: [ZONE<id>] where <id> = map number.
;
; Type values: Normal, Safe, PvP, Arena, Dungeon, Town
; Ambient: R,G,B (0-255)
; Respawn: zone_id, x, y — where players respawn on death
; GridWidth/GridHeight: tile dimensions (default 100 for legacy maps)
; LevelMin/LevelMax: level restriction (0 = no restriction)
; ============================================================

; Example: Ullathorpe as a safe town zone
;[ZONE1]
;Name=Ciudad de Ullathorpe
;Type=Town
;Music=3
;Ambient=200,200,200
;Terrain=TIERRA
;NoMagic=0
;NoInvis=0
;NoResurrect=0
;NoHide=0
;NoSummon=0
;RespawnZone=1
;RespawnX=50
;RespawnY=50
;NpcRespawn=1
;GridWidth=100
;GridHeight=100
;Backup=1
;LevelMin=0
;LevelMax=0
